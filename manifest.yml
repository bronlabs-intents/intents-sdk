info:
  name: intents-sdk
  version: "1.0"
  category: intents

include:
  - file: /etc/serve/include.d/library.yml

build:
  - node:
      node: |
        pnpm install && \
        pnpm run build && \
        pnpm version {{ info.build-version }} --no-git-tag-version && \
        (if test "{{ vars.no-push }}" != "true"; then npm pkg delete publishConfig.registry && pnpm publish --no-git-checks --registry "$NPM_RELEASES_REGISTRY"; fi)

promote:
  - node:
      node: >
        pnpm install &&
        pnpm run test &&
        pnpm run build &&
        pnpm version {{ info.build-version }} --no-git-tag-version &&
        HTTPS_PROXY="$BRON_HTTP_PROXY" HTTP_PROXY="$BRON_HTTP_PROXY"
        script -qec "pnpm publish --no-git-checks" /dev/null
      envs:
        BRON_HTTP_PROXY: ""
